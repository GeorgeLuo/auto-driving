name: Deterministic tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AUTOMA_TEST_LIVE_SIM: "0"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install test dependencies
        run: python3 -m pip install -r requirements-test.txt

      - name: Run deterministic tests with coverage
        run: |
          python3 -m coverage run tests/run.py
          python3 -m coverage combine

      - name: Publish informational coverage
        run: |
          python3 -m coverage report
          python3 -m coverage report --format=markdown --skip-covered >> "$GITHUB_STEP_SUMMARY"
